# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGO_URI}

# JWT (must be at least 32 characters for HMAC-SHA256)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-days=7

# CORS
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# Brevo Email
app.brevo.api-key=${BREVO_API_KEY}
app.email.sender=${SENDER_EMAIL}
app.email.feedback-to=${FEEDBACK_TO_EMAIL}

# Cookie
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Strict}

# Spring Boot .env file loading
spring.config.import=optional:file:.env[.properties]
